<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Kareem</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf9f2; /* Light brown background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            /* My overlay */
            background-image: radial-gradient(circle at 2px 2px, #d4af37 1px, transparent 0);
            background-size: 40px 40px;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid #d4af37; /* Gold border */
            max-width: 400px;
        }
        h1 { color: #2c3e50; font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { color: #d4af37; font-weight: 400; margin-top: 0; }
        h3 { color: #7f8c8d; font-style: italic; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #d4af37;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn:hover { background-color: #b8962d; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Ramadan Kareem!</h1>
        <h2>Ramadan is here!</h2>
        <h3>Alhamdulillah!</h3>
        <a href="Eidcount.html" class="btn">Ramadan Countdown</a>
    </div>
</body>
</html>
